<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolás | Estructura de Cajas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #e9ecef;
            font-family: 'Inter', sans-serif;
        }

        /* DISEÑO DE LAS CAJAS */
        article.box-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 8px;
            border-radius: 4px; /* Bordes más rectos para estilo técnico */
            background: #ffffff;
            border: 1px solid #dee2e6;
            box-shadow: 4px 4px 0px #adb5bd; /* Sombra sólida estilo retro-moderno */
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            color: #495057;
            transition: all 0.2s ease;
        }

        article.box-inner:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px #6c757d;
            background: #f8f9fa;
            color: #0d6efd;
        }

        /* COLORES DE REFERENCIA (Bordes) */
        .border-blue { border-left: 5px solid #0d6efd !important; }
        .border-green { border-left: 5px solid #198754 !important; }
        .border-yellow { border-left: 5px solid #ffc107 !important; }
        .border-red { border-left: 5px solid #dc3545 !important; }

        .vh-large { min-height: 250px; }
        .vh-small { min-height: 80px; }

        .navbar { background: white; border-bottom: 2px solid #212529; }
    </style>
</head>
<body>

    <nav class="navbar sticky-top py-3">
        <section class="container-fluid px-4">
            <a class="nav-link fw-bold" href="index.html">
                <i class="fas fa-arrow-left"></i> VOLVER AL PORTAFOLIO
            </a>
            <span class="ms-auto font-monospace fw-bold"> NICOLÁS CASTILLA</span>
        </section>
    </nav>

    <main class="container py-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold"></h1>
            <p class="text-muted font-monospace"></p>
        </header>

        <section class="structural-outer p-3 border border-2 border-dark bg-white shadow">
            
            <article class="row g-0 mb-3">
                <article class="col-12"><article class="box-inner border-green">CAJA</article></article>
                <article class="col-12"><article class="box-inner border-blue">CAJA</article></article>
                <article class="col-12"><article class="box-inner border-yellow vh-large">CAJA</article></article>
            </article>

            <article class="row g-0 mb-3">
                <article class="col-md-6">
                    <article class="box-inner border-red vh-large">CAJA</article>
                </article>
                <aside class="col-md-6">
                    <article class="box-inner border-blue vh-small">CAJA</article>
                    <article class="box-inner border-blue vh-small">CAJA</article>
                    <article class="box-inner border-blue vh-small">CAJA</article>
                </aside>
            </article>

            <article class="row g-0 mb-3">
                <article class="col-md-8">
                    <article class="box-inner border-red vh-large">CAJA</article>
                </article>
                <aside class="col-md-4">
                    <article class="box-inner border-green flex-fill" style="min-height: 120px;">CAJA</article>
                    <article class="box-inner border-green flex-fill" style="min-height: 120px;">CAJA</article>
                </aside>
            </article>

            <article class="row g-0">
                <header class="col-12">
                    <article class="box-inner border-red">CAJA</article>
                </header>
                <article class="col-3"><article class="box-inner border-green vh-small">CAJA</article></article>
                <article class="col-3"><article class="box-inner border-green vh-small">CAJA</article></article>
                <article class="col-3"><article class="box-inner border-green vh-small">CAJA</article></article>
                <article class="col-3"><article class="box-inner border-green vh-small">CAJA</article></article>
                <footer class="col-12">
                    <article class="box-inner border-red">CAJA</article>
                </footer>
            </article>

        </section>
    </main>

    <footer class="py-5 text-center">
        <p class="small font-monospace">NICOLÁS CASTILLA &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
